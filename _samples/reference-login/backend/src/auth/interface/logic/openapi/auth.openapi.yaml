openapi: 3.1.0
info:
  title: Sample Auth API
  version: 1.0.0
paths:
  /api/auth/login:
    post:
      summary: Login with sample credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login succeeded
        '401':
          description: Invalid credentials
  /api/auth/me:
    get:
      summary: Get current user from session token
      parameters:
        - in: header
          name: x-session-token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current user found
        '401':
          description: Session not found
